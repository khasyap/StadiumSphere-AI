name: stadiumsphere-ai

services:
  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    ports:
      - '${WEB_PORT}:5173'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:5173').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - platform

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      MONGODB_SERVER_SELECTION_TIMEOUT_MS: ${MONGODB_SERVER_SELECTION_TIMEOUT_MS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      LOG_LEVEL: ${API_LOG_LEVEL}
      API_PREFIX: ${API_PREFIX}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED}
    ports:
      - '${API_PORT}:3000'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/v1/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - platform

  ai:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/ai/Dockerfile
    env_file: .env
    environment:
      ENVIRONMENT: development
      PORT: 8000
      LOG_LEVEL: ${AI_LOG_LEVEL}
    ports:
      - '${AI_PORT}:8000'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - platform

  mongodb:
    restart: unless-stopped
    image: mongo:8.0
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    ports:
      - '${MONGODB_PORT}:27017'
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  redis:
    restart: unless-stopped
    image: redis:7.4-alpine
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  mongodb-data:
  redis-data:
